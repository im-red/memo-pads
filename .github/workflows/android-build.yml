name: Build Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build # Or your specific build command (e.g., vite build)

      # OPTIONAL: Set Version String dynamically
      - name: Set Android Version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npx capacitor-set-version set:android -v $VERSION -b ${{ github.run_number }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign APK Manually
        run: |
          # Extract version from tag (strip leading 'v')
          VERSION="${GITHUB_REF_NAME}-b${{ github.run_number }}"
          REPO_NAME="${{ github.event.repository.name }}"

          # 1. Create the signing directory
          mkdir -p .signing

          # 2. Decode the Keystore from your GitHub Secret into a file
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > .signing/release.jks

          # 3. Find the latest build-tools path
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)

          # 4. Sign the APK using apksigner
          $BUILD_TOOLS_PATH/apksigner sign \
            --ks .signing/release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out android/app/build/outputs/apk/release/${REPO_NAME}-${VERSION}.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

          # 5. Clean up the sensitive keystore file
          rm -rf .signing

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/${{ github.event.repository.name }}-*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: android/app/build/outputs/apk/release/${{ github.event.repository.name }}-*.apk